# OPERATING RULES (MANDATORY)
# 1. Discovery comes first; do not treat this spec as portfolio-ready by default.
# 2. Screening is required before any promotion decision.
# 3. Eligible successful single runs must receive automatic walk-forward and stress validation.
# 4. Only validated survivors may become candidate_for_portfolio.
# 5. Rejected runs must not be included in portfolio construction.

# Sprint 06: Combinatory SMC Testing
# Tests combinations of indicators dynamically.
# The minimal fire score is adjusted to reflect the combined value of the desired signals.

experiment:
  id: sprint_06_modular_combo
  timeframes: ["15m", "1h"]

  dataset: "config/datasets/gold_primary.yaml"

  strategies:
    - id: "combo_fvg_ob_market_structure"
      class_path: "src.gold_research.strategies.smc.confluence_scorer_strategy.ConfluenceScorerStrategy"
      config_class: "src.gold_research.strategies.smc.confluence_scorer_strategy.ConfluenceScorerConfig"
      config:
        window_size: 200
        stop_atr_multiplier: 2.0
        trailing_stop_multiplier: 2.0
        active_detectors: ["fvg", "order_blocks", "market_structure"]
        min_fire_score: 6

    - id: "combo_liquidity_sweep_trend"
      class_path: "src.gold_research.strategies.smc.confluence_scorer_strategy.ConfluenceScorerStrategy"
      config_class: "src.gold_research.strategies.smc.confluence_scorer_strategy.ConfluenceScorerConfig"
      config:
        window_size: 200
        stop_atr_multiplier: 1.5
        trailing_stop_multiplier: 1.5
        active_detectors: ["liquidity_pools", "market_structure"]
        min_fire_score: 5
